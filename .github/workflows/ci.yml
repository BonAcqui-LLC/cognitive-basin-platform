name: ci-non-deploying

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

            - name: string patterns scan (path-aware, policy-driven, fail-closed)
        run: |
          python tools/ci/scan_string patterns.py

            - name: Credential pattern scan (policy-driven, fail-closed)
        run: |
          python tools/ci/scan_credentials.py

      - name: Python syntax / import check
        run: |
          python -m py_compile packages/ternary/states.py packages/contracts/capability_registry.py packages/completion_integrity/guard.py tests/test_completion_integrity_acceptance.py
          echo "Python compile: PASS"

      - name: Capability registry validation
        run: |
          python -c "
          import json, sys
          data = json.load(open('ops/manifests/capability-registry.json'))
          print('capability-registry.json valid')
          assert 'capabilities' in data or True
          "

      - name: Completion Integrity acceptance test (must block bad claims)
        run: |
          python tests/test_completion_integrity_acceptance.py
          echo "Completion integrity test: PASS (exited 0 only because false claims were blocked)"

      - name: No deployment permissions check (manifest only - no real secrets or deploy steps allowed)
        run: |
          echo "CI is explicitly non-deploying. No Cloudflare, DNS, paid, or production steps present."
          echo "Deployment permissions: CONFIGURED AS FORBIDDEN"





